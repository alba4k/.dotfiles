[module/backlight]
type = internal/backlight

card = intel_backlight
enable-scroll = true

format = <ramp> <label>
format-background = ${color.yellow}

label = %percentage%%
label-foreground = ${color.foreground}

ramp-0 = ’ŚØ
ramp-1 = ’Ś£
ramp-2 = ’Ś×
ramp-3 = ’Ś¤
ramp-font = 2
ramp-foreground = ${color.foreground}

