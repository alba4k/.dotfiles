[module/wlan]
type = internal/network
interface-type = wireless
interval = 1
unknown-as-up = true

format-connected = <ramp-signal><label-connected>
format-connected-background = ${color.magenta}
format-connected-foreground = ${color.foreground}
label-connected = "%essid% "

format-disconnected = "’¬® WiFi "
format-disconnected-background = ${color.magenta}
format-disconnected-foreground = ${color.foreground}

ramp-signal-0 = "ŅāĢ "
ramp-signal-1 = "Ņā¢ "
ramp-signal-2 = "ŅāŚ "
ramp-signal-3 = "Ņāś "
ramp-signal-4 = "ŅāÖ "

[module/eth]
type = internal/network
interface-type = wired
interval = 1

label-connected = "’£Ć %netspeed%"
format-connected-background = ${color.green}
format-connected-foreground = ${color.foreground}

format-disconnected = "’£ü ETH"
format-disconnected-background = ${color.green}
format-disconnected-foreground = ${color.foreground}

[module/bluetooth]
type = custom/script
exec = ~/.config/polybar/bluetooth.sh
format-padding = 1
format-foreground = ${color.foreground}
format-background = ${color.blue}
interval = 0.2
click-left = exec blueman-manager
click-right = exec ~/.config/polybar/toggle_bluetooth.sh
click-middle = exec ~/.local/bin/buds

