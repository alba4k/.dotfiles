[module/cpu]
type = internal/cpu
interval = 1
format-prefix = "’ĪÜ "
format-padding = 0
format-prefix-foreground = ${color.foreground}
format-foreground = ${color.foreground}
format-background = ${color.green}
label = "%{A1:terminal -e gtop &:}%percentage%% %{A}"

