# HYPRIDLE - alba4k
#
# Documentation: https://wiki.hyprland.org/Hypr-Ecosystem/hypridle

general {
    lock_cmd = pidof hyprlock || hyprlock -q
    unlock_cmd = killall -q -SIGUSR1 hyprlock
    on_unlock_cmd = hyprctl dispatch "hl.dsp.dpms({action = 'on'})" & hyprctl dispatch "hl.dsp.force_idle(0)"
    before_sleep_cmd = playerctl -a pause & pidof hyprlock || hyprlock -q --no-fade-in --immediate-render
    after_sleep_cmd = hyprctl dispatch "hl.dsp.dpms({action = 'on'})" & hyprctl hyprsunset reset gamma
    inhibit_sleep = 3
}

listener {
    timeout = 30
    on-timeout = pidof hyprlock || hyprctl hyprsunset gamma 50
    on-resume = hyprctl hyprsunset reset gamma
}

listener {
    timeout = 30
    on-timeout = pidof hyprlock && hyprctl dispatch "hl.dsp.dpms({action = 'off'})"
    on-resume = hyprctl dispatch "hl.dsp.dpms({action = 'on'})"
}

listener {
    timeout = 90
    on-timeout = loginctl lock-session
}

listener {
    timeout = 120
    on-timeout = hyprctl dispatch "hl.dsp.dpms({action = 'off'})"
    # also handled by the listener for 30s
    on-resume = hyprctl dispatch "hl.dsp.dpms({action = 'on'})"
}

listener {
    timeout = 300
    on-timeout = systemctl suspend-then-hibernate
}

